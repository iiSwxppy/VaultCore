name: Bug report
description: Report a bug. Do NOT use this for security issues — see SECURITY.md.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not paste your master password, secret key, vault file contents, or any data
        that could identify your accounts. The issue tracker is public.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered list of steps from a clean install.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: VaultCore version / commit
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Which component?
      multiple: true
      options:
        - CLI (vault)
        - Desktop (Avalonia)
        - Native messaging host (vault-mh)
        - Browser extension
        - Sync layer
        - Crypto / file format
        - Other / unsure
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS (and browser if applicable)
      placeholder: "Windows 11 23H2 / Brave 1.71"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error messages
      description: |
        Paste relevant output. Redact anything that could identify your sites
        or accounts. The audit log (`vault audit <path>`) may contain item IDs
        which are non-sensitive.
      render: shell
