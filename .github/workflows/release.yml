name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  publish-binaries:
    name: Publish binaries (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish CLI
        run: dotnet publish src/Vault.Cli -c Release -r ${{ matrix.rid }} --self-contained -o publish/cli/${{ matrix.rid }}

      - name: Publish native messaging host
        run: dotnet publish src/Vault.Host -c Release -r ${{ matrix.rid }} -o publish/host/${{ matrix.rid }}

      - name: Publish desktop
        run: dotnet publish src/Vault.Desktop -c Release -r ${{ matrix.rid }} --self-contained -o publish/desktop/${{ matrix.rid }}

      - name: Archive
        shell: bash
        run: |
          cd publish
          for dir in cli/${{ matrix.rid }} host/${{ matrix.rid }} desktop/${{ matrix.rid }}; do
            name=$(basename $(dirname $dir))-${{ matrix.rid }}
            if [[ "${{ matrix.rid }}" == win-* ]]; then
              (cd $dir && 7z a -tzip ../../$name.zip *)
            else
              tar czf $name.tar.gz -C $dir .
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.rid }}
          path: publish/*.{zip,tar.gz}

  build-extension:
    name: Build extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build
        working-directory: ./extension
        run: |
          npm install
          npm run build

      - name: Package extension
        run: |
          cd extension/dist && zip -r ../../vaultcore-extension.zip .

      - name: Upload extension
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: vaultcore-extension.zip

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vaultcore-cli
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: GitHub release
    needs: [publish-binaries, build-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
